# Coverage is enforced per-module at build time by JaCoCo
# (jacocoTestCoverageVerification). Codecov's own statuses are kept
# informational so a coverage delta on a PR never blocks a merge — the
# authoritative gate is the build, not this service.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
comment: false
