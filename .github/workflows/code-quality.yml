name: Code Quality Analysis

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: secrets.CODECOV_TOKEN != ''
        with:
          files: ./ligero-core/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Skip Codecov upload
        if: secrets.CODECOV_TOKEN == ''
        run: echo "Codecov token not configured. Coverage reports are still available in build artifacts."

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/test/TEST-*.xml'
          check_name: Test Results

      - name: Check coverage thresholds
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./ligero-core/build/reports/jacoco/test/jacocoTestReport.lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
