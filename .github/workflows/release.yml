name: Publish to Maven Central

# Runs when a GitHub Release is published. The version is taken from the tag
# (e.g. tag `v1.2.0` -> version `1.2.0`), so `gradle.properties` never has to be
# bumped by hand for a release. After a successful publish, `main` is moved on
# to the next patch `-SNAPSHOT` (e.g. `1.2.1-SNAPSHOT`) automatically.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'          # the framework compiles with Java 21
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish + release to Maven Central
        # The version comes from the release tag (v1.2.0 -> 1.2.0); publishToSonatype
        # uploads the signed artifacts to a staging repo and
        # closeAndReleaseSonatypeStagingRepository closes and releases it.
        run: >
          ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository
          -Pversion=${GITHUB_REF_NAME#v}
          --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}

  bump-snapshot:
    # After a successful release, open a PR moving `main` to the next patch
    # -SNAPSHOT so everyday development targets the upcoming version — no manual
    # edit. Skipped for pre-releases (a tag marked "pre-release" on GitHub).
    needs: publish
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Compute next -SNAPSHOT from the tag
        id: next
        run: |
          released="${GITHUB_REF_NAME#v}"
          if [[ ! "$released" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$released' is not X.Y.Z — skipping the snapshot bump."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          IFS='.' read -r major minor patch <<< "$released"
          echo "next=${major}.${minor}.$((patch + 1))-SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Apply the bump
        if: steps.next.outputs.skip != 'true'
        run: sed -i -E "s/^version=.*/version=${{ steps.next.outputs.next }}/" gradle.properties

      - name: Open the version-bump PR
        if: steps.next.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # `main` is protected (changes go through a PR + checks), so open a PR
          # instead of pushing. Use a RELEASE_BOT_TOKEN (PAT/App token) so the
          # PR's checks actually run — GITHUB_TOKEN-created PRs don't trigger CI,
          # which the branch rule requires before merging. Enable repo auto-merge
          # to land it hands-free.
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          base: main
          branch: chore/next-snapshot
          delete-branch: true
          add-paths: gradle.properties
          commit-message: "chore: begin ${{ steps.next.outputs.next }} development"
          title: "chore: begin ${{ steps.next.outputs.next }} development"
          body: |
            Automated post-release bump of `gradle.properties` to the next
            `-SNAPSHOT` (`${{ steps.next.outputs.next }}`) after publishing
            `${{ github.ref_name }}`. Safe to merge once checks pass.
          author: Duvan Jamid <duvanjamid.work@gmail.com>
          committer: Duvan Jamid <duvanjamid.work@gmail.com>
